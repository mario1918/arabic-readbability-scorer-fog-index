<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#f0f4f8" rx="8"/>
  
  <!-- Outer circle (meter) -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#e0e7f1" stroke-width="2"/>
  
  <!-- Gauge arc (representing readability level) -->
  <path d="M 20 32 A 12 12 0 0 1 44 32" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center circle -->
  <circle cx="32" cy="32" r="14" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  
  <!-- Arabic letter "ع" (ain) - representing Arabic text -->
  <text x="32" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="central">ع</text>
  
  <!-- Clarity indicator lines -->
  <line x1="52" y1="18" x2="56" y2="14" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="22" x2="59" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Accessibility accent -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
</svg>